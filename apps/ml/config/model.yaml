optuna:
  n_trials: 40
  timeout_seconds: 300

cv:
  n_splits: 5

lgb_space:
  num_leaves: [15, 63]
  min_child_samples: [10, 60]
  learning_rate: [0.01, 0.08]
  feature_fraction: [0.6, 1.0]
  bagging_fraction: [0.6, 1.0]
  bagging_freq: 5
  n_estimators: 2000
  early_stopping_rounds: 50

cat_space:
  depth: [3, 6]
  learning_rate: [0.01, 0.08]
  l2_leaf_reg: [3.0, 20.0]
  min_data_in_leaf: [5, 30]
  random_strength: [0.1, 1.0]
  bagging_temperature: [0.0, 1.0]
  iterations: 2000
  early_stopping_rounds: 50

pruning:
  importance_threshold: 0.01
  rmse_tolerance: 0.01
